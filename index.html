<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contas a Pagar</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<aside class="sidebar">

  <div class="sidebar-logo">
    <div class="logo-icon">💹</div>
    <span class="logo-name">Rende Mais</span>
  </div>

  <div class="profile">
    <div class="avatar">US</div>
    <div>
      <strong>Edmilson</strong>
      <p>Conta pessoal</p>
    </div>
  </div>

  <div class="menu">
  <span class="section">MENU</span>

  <p class="active"><i class="icon"></i> Início</p>
  <p><i class="icon"></i> Contas a Receber</p>
  <p><i class="icon"></i> Contas a Pagar</p>
  <p><i class="icon"></i> Plano de Aporte</p>

  <span class="section">RELATÓRIOS</span>

  <p><i class="icon"></i> Extrato</p>
  <p><i class="icon"></i> Histórico</p>
</div>

</aside>

<div class="main">

  <!-- PAGE CONTENT -->

  <div class="page">

<div class="header">

  <div class="header-left">
    <h2>Olá, Edmilson 👋</h2>
    <span>Sexta-feira, 1 de maio de 2026</span>
  </div>

  <div class="header-right">
    <div class="search-box">
      <input type="text" placeholder="Pesquisar...">
    </div>

    <div class="icon-btn">🔔</div>
    <div class="icon-btn">⚙️</div>
  </div>

</div>

<div class="card">
  <h1>Contas a pagar</h1>

  <div class="section-title">Contas Fixas</div>
  <div id="fixas"></div>

  <div class="section-title">Contas Variáveis</div>
  <div id="variaveis"></div>

  <div class="add-box">
    <input id="nome" placeholder="Nome">
    <input id="valor" type="number" placeholder="Valor">
    <input id="vencimento" type="date">
    <select id="tipo">
      <option value="fixa">Fixa</option>
      <option value="variavel">Variável</option>
    </select>
    <button onclick="addConta()">Adicionar</button>
  </div>
</div>

  </div><!-- /page -->

</div>

<script src="script.js"></script>

</body>
</html>
